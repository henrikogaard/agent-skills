name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Validate public skill catalog
        run: ruby scripts/skills validate --format json
      - name: Run catalog and inventory tests
        run: ruby tests/test_skills_cli.rb
